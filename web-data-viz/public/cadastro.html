<!--CADASTRO-->
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Nexus | Cadastro</title>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body onload="listar()">
  <main class="cadastro_container">
    <!--Lado do formulário-->
    <div class="lado_esquerdo">

      <div class="grupo_voltar">
        <a href="./index.html" class="botao_de_voltar">
          <span class="seta">
            <i class="fa-solid fa-arrow-left"></i>
          </span>
        </a>
        <span class="voltar"><a href="./index.html">Voltar</a></span>
      </div>

      <!--Formulário-->
      <h1>CADASTRE-SE</h1>
      <p>Conecte-se a novas oportunidades com a Nexus</p>


      <div class="card-login">

        <div class="linha-dupla">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome_input" placeholder="Seu nome">
          </div>

          <div class="campo">
            <label>Email</label>
            <input type="email" id="email_input" placeholder="meuemail@provedor.com">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label>CNPJ</label>
            <input type="text" id="cnpj_input" placeholder="00.000.000/0000-00">
          </div>

          <div class="campo">
            <label>Telefone</label>
            <input type="tel" id="telefone_input" placeholder="(11) 99999-9999">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha_input" placeholder="**********">
          </div>

          <div class="campo">
            <label>Confirmar senha</label>
            <input type="password" id="confirmacao_senha_input" placeholder="**********">
          </div>
        </div>

        <button onclick="cadastrar()">Cadastrar</button>

        <span class="login">
          Já possui conta? <a href="./login.html">Login</a>
        </span>

        <div id="cardErro" style="display:none; color:red; margin-top:10px;">
          <span id="mensagem_erro"></span>
        </div>

      </div>
    </div>


    <!--Lado Direito-->
    <div class="lado_direito">
      <!--Logo da Nexus-->
      <img src="assets/logobrancoNexus.png" alt="Logo da Nexus" class="logo">

      <!-- Triângulos decorativos -->
      <div class="triangulo_esquerda"></div>
      <div class="triangulo_direita"></div>

      <img src="assets/Cadastro.svg" alt="Ilustração de login" class="img">
    </div>
  </main>
</body>

</html>
<script>
  function cadastrar() {
    // Pegando os valores do formulário
    var nomeVar = document.getElementById("nome_input").value;
    var emailVar = document.getElementById("email_input").value;
    var senhaVar = document.getElementById("senha_input").value;
    var confirmacaoSenhaVar = document.getElementById("confirmacao_senha_input").value;
    var cnpjVar = document.getElementById("cnpj_input").value;
    var telefoneVar = document.getElementById("telefone_input").value;

    // Selecionando elementos de mensagem de erro
    var cardErro = document.getElementById("cardErro");
    var mensagem_erro = document.getElementById("mensagem_erro");

    // Verificando se algum campo está vazio
    if (nomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoSenhaVar == "" || cnpjVar == "" || telefoneVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos!";
      setTimeout(function () { cardErro.style.display = "none"; }, 5000);
      return false;
    }

    // Verificando se as senhas são iguais
    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não coincidem!";
      setTimeout(function () { cardErro.style.display = "none"; }, 5000);
      return false;
    }

    // Enviando os dados para o backend
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        cnpjServer: cnpjVar,
        telefoneServer: telefoneVar
      })
    })
      .then(function (resposta) {
        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "Cadastro realizado com sucesso! Redirecionando...";
          setTimeout(function () { window.location = "login.html"; }, 2000);
          limparFormulario();
        } else {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "Erro ao cadastrar!";
          setTimeout(function () { cardErro.style.display = "none"; }, 5000);
        }
      })
      .catch(function (erro) {
        console.log("ERRO:", erro);
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Erro na conexão com o servidor!";
        setTimeout(function () { cardErro.style.display = "none"; }, 5000);
      });

    return false;
  }

  // Função para limpar o formulário
  function limparFormulario() {
    document.getElementById("nome_input").value = "";
    document.getElementById("email_input").value = "";
    document.getElementById("senha_input").value = "";
    document.getElementById("confirmacao_senha_input").value = "";
    document.getElementById("cnpj_input").value = "";
    document.getElementById("telefone_input").value = "";
  }
</script>
