<!--CADASTRO-->
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Nexus | Cadastro</title>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body onload="listar()">
  <main class="cadastro_container">
    <!--Lado do formulário-->
    <div class="lado_esquerdo">
      <div class="grupo_voltar">
        <a href="./index.html" class="botao_de_voltar">
          <span class="seta">
            <i class="fa-solid fa-arrow-left"></i>
          </span>
        </a>
        <span class="voltar"><a href="./index.html">Voltar</a></span>
      </div>
      <!--Formulário-->
      <h1>CADASTRE-SE</h1>
      <p>Conecte-se a novas oportunidades com a Nexus</p>
      <div class="card-login">
        <div class="linha-dupla">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome_input" placeholder="Seu nome">
          </div>
          <div class="campo">
            <label>Email</label>
            <input type="email" id="email_input" placeholder="meuemail@provedor.com">
          </div>
        </div>
        <div class="linha-dupla">
          <div class="campo">
            <label>CNPJ</label>
            <input type="text" id="cnpj_input" placeholder="00.000.000/0000-00">
          </div>
          <div class="campo">
            <label>Telefone</label>
            <input type="tel" id="telefone_input" placeholder="(11) 99999-9999">
          </div>
        </div>
        <div class="linha-dupla">
          <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha_input" placeholder="**********">
          </div>
          <div class="campo">
            <label>Confirmar senha</label>
            <input type="password" id="confirmacao_senha_input" placeholder="**********">
          </div>
        </div>
        <button onclick="cadastrar()">Cadastrar</button>
        <span class="login">
          Já possui conta? <a href="./login.html">Login</a>
        </span>
        <!--Mensagem de erro de senha-->
        <div id="erro_senha" class="mensagem_senha"></div>
        <div id="erro_confirmacao" class="mensagem_senha"></div>
      </div>
    </div>
    <!--Lado Direito-->
    <div class="lado_direito">
      <!--Logo da Nexus-->
      <img src="assets/logobrancoNexus.png" alt="Logo da Nexus" class="logo">
      <!-- Triângulos decorativos -->
      <div class="triangulo_esquerda"></div>
      <div class="triangulo_direita"></div>
      <img src="assets/Cadastro.svg" alt="Ilustração de login" class="img">
    </div>
  </main>
</body>

</html>
<!--Máscaras para os inputs, pode melhorar, precisa fazer as retrições também, um sistema bem ferrado :)-->
<script>
  const cnpjInput = document.getElementById("cnpj_input");

  cnpjInput.addEventListener("input", function () {

    let valor = cnpjInput.value;
    let somenteNumeros = "";

    for (let i = 0; i < valor.length; i++) {
      if (valor[i] >= "0" && valor[i] <= "9") {
        somenteNumeros += valor[i];
      }
    }

    // limita a 14 números 
    if (somenteNumeros.length > 14) {
      let limite = "";
      for (let i = 0; i < 14; i++) {
        limite += somenteNumeros[i];
      }
      somenteNumeros = limite;
    }

    let formatado = "";

    for (let i = 0; i < somenteNumeros.length; i++) {

      if (i == 2 || i == 5) {
        formatado += ".";
      }

      if (i == 8) {
        formatado += "/";
      }

      if (i == 12) {
        formatado += "-";
      }

      formatado += somenteNumeros[i];
    }

    cnpjInput.value = formatado;
  });
</script>

<script>
  const telefoneInput = document.getElementById("telefone_input");

  telefoneInput.addEventListener("input", function () {

    let valor = telefoneInput.value;
    let somenteNumeros = "";

    // pega só números
    for (let i = 0; i < valor.length; i++) {
      if (valor[i] >= "0" && valor[i] <= "9") {
        somenteNumeros += valor[i];
      }
    }

    // 🔒 limita a 11 números (DDD + 9 dígitos)
    if (somenteNumeros.length > 11) {
      let limite = "";
      for (let i = 0; i < 11; i++) {
        limite += somenteNumeros[i];
      }
      somenteNumeros = limite;
    }

    // monta máscara manualmente
    let formatado = "";

    for (let i = 0; i < somenteNumeros.length; i++) {

      if (i == 0) {
        formatado += "(";
      }

      if (i == 2) {
        formatado += ") ";
      }

      if (i == 7) {
        formatado += "-";
      }

      formatado += somenteNumeros[i];
    }

    telefoneInput.value = formatado;
  });
</script>
<script>
  const senhaInput = document.getElementById("senha_input");
  const erroSenha = document.getElementById("erro_senha");

  senhaInput.addEventListener("input", function () {

    let senha = senhaInput.value;

    let temMaiuscula = false;
    let temNumero = false;
    let temEspecial = false;

    // verifica caractere por caractere
    for (let i = 0; i < senha.length; i++) {

      let caractere = senha[i];

      if (caractere >= "A" && caractere <= "Z") {
        temMaiuscula = true;
      }

      if (caractere >= "0" && caractere <= "9") {
        temNumero = true;
      }

      if (
        caractere == "!" ||
        caractere == "@" ||
        caractere == "#" ||
        caractere == "$" ||
        caractere == "%" ||
        caractere == "&" ||
        caractere == "*"
      ) {
        temEspecial = true;
      }
    }

    if (senha.length < 8) {
      erroSenha.innerHTML = "A senha deve ter no mínimo 8 caracteres.";
    } else if (!temMaiuscula) {
      erroSenha.innerHTML = "A senha precisa ter pelo menos 1 letra maiúscula.";
    } else if (!temNumero) {
      erroSenha.innerHTML = "A senha precisa ter pelo menos 1 número.";
    } else if (!temEspecial) {
      erroSenha.innerHTML = "A senha precisa ter 1 caractere especial (!@#$%&*).";
    } else {
      erroSenha.innerHTML = "Senha válida!";
      erroSenha.style.color = "green";
    }

  });
</script>
