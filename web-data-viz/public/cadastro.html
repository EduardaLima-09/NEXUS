<!--CADASTRO-->
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Nexus | Cadastro</title>
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body onload="listar()">
  <main class="cadastro_container">
    <!--Lado do formulário-->
    <div class="lado_esquerdo">

      <div class="grupo_voltar">
        <a href="./index.html" class="botao_de_voltar">
          <span class="seta">
            <i class="fa-solid fa-arrow-left"></i>
          </span>
        </a>
        <span class="voltar"><a href="./index.html">Voltar</a></span>
      </div>

      <!--Formulário-->
      <h1>CADASTRE-SE</h1>
      <p>Conecte-se a novas oportunidades com a Nexus</p>


      <div class="card-login">

        <div class="linha-dupla">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome_input" placeholder="Seu nome">
          </div>

          <div class="campo">
            <label>Email</label>
            <input type="email" id="email_input" placeholder="meuemail@provedor.com">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label>CNPJ</label>
            <input type="text" id="cnpj_input" placeholder="00.000.000/0000-00">
          </div>

          <div class="campo">
            <label>Telefone</label>
            <input type="tel" id="telefone_input" placeholder="(11) 99999-9999">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha_input" placeholder="**********">
          </div>

          <div class="campo">
            <label>Confirmar senha</label>
            <input type="password" id="confirmacao_senha_input" placeholder="**********">
          </div>
        </div>

        <button onclick="cadastrar()">Cadastrar</button>

        <span class="login">
          Já possui conta? <a href="./login.html">Login</a>
        </span>

      </div>

      <div id="div_erros_login"></div>
    </div>


    <!--Lado Direito-->
    <div class="lado_direito">
      <!--Logo da Nexus-->
      <img src="assets/logobrancoNexus.png" alt="Logo da Nexus" class="logo">

      <!-- Triângulos decorativos -->
      <div class="triangulo_esquerda"></div>
      <div class="triangulo_direita"></div>

      <img src="assets/Cadastro.svg" alt="Ilustração de login">
    </div>
  </main>
</body>

</html>
<script src="./js/sessao.js"></script>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
