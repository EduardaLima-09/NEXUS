<!--LOGIN-->
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Nexus | Login</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>
    <main class="login_container">
        <!-- Triângulos decorativos -->
        <div class="triangulo_esquerda"></div>
        <div class="triangulo_direita"></div>

        <!--Lado 01 - Imagem com os triângulos-->
        <div class="lado-esquerdo">
            <div class="grupo_voltar">
                <a href="./index.html" class="botao_de_voltar">
                    <span class="seta">
                        <i class="fa-solid fa-arrow-left"></i>
                    </span>
                </a>
                <span class="voltar">Voltar</span>
            </div>
            <img src="assets/Login.png" alt="Ilustração de login">
        </div>

        <!--Lado 02 - Formulário de login-->
        <div class="lado-direito">

            <!--Logo da Nexus-->
            <img src="assets/logobrancoNexus.png" alt="Logo da Nexus" class="logo">

            <h1>BEM VINDO!</h1>
            <p>Conecte-se à sua conta</p>
            <div class="card-login">
                <label>CNPJ ou Email</label>
                <input type="text" id="email_input" placeholder="00.000.000/0000-00">

                <label>Senha</label>
                <input type="password" id="senha_input" placeholder="**********">

                <button onclick="entrar()">Login</button>

                <div id="cardErro" style="display: none;">
                    <span id="mensagem_erro"></span>
                </div>

                <span class="cadastro">
                    Não possui conta? <a href="#">Cadastre-se</a>
                </span>
            </div>
        </div>
    </main>
</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
<script src="./js/sessao.js"></script>
